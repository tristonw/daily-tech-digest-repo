name: Daily Digest and Podcast

# 模块2+3：每日汇总分析 + 双人播客脚本与音频。
# 00:30 UTC = 08:30 GMT+8。先补一次采集，再分析、生成脚本与音频。
on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: digest-data
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    env:
      # 配置仓库 Secret ANTHROPIC_API_KEY 后自动生成高质量内容；
      # 未配置则产出模板版 digest 与占位脚本。
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect (top-up, refreshes dashboard)
        run: python run.py collect --once

      - name: Morning brief
        run: python run.py brief

      - name: Analyze
        run: python run.py analyze

      - name: Generate podcast script
        run: python run.py podcast
        # 音频合成与发布由 pages.yml 负责（self-hosted Piper + GitHub Pages），此处只产文稿。

      - name: Commit report and script
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ reports/ podcasts/ briefs/ DASHBOARD.md
          if git diff --cached --quiet; then
            echo "无内容变化，跳过提交"
          else
            git commit -m "chore: daily digest and podcast $(date -u +%Y-%m-%d)"
            git pull --rebase origin ${{ github.ref_name }} || true
            git push origin HEAD:${{ github.ref_name }}
          fi
