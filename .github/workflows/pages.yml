name: Publish Podcast Site

# 合成音频并发布到 GitHub Pages 在线播放页。
# 每日 01:00 UTC（09:00 GMT+8，在 daily 之后）+ 手动触发。
on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 缓存 Piper 语音模型（约 120MB），避免每次重新下载
      - name: Cache Piper models
        uses: actions/cache@v4
        with:
          path: data/piper_models
          key: piper-models-zh-v1

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          # 自托管 Piper TTS（开源、可商用）。如改用 edge/azure 可删此段。
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements-piper.txt

      - name: Synthesize audio and build site
        run: python run.py publish

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
